model:
  name: inctrlv2
  backbone: ViT-B-16-plus-240
  input_size: 240
  selected_layers: [7, 9, 11]
  freeze_clip: true

training:
  optimizer: adam
  lr: 0.001
  weight_decay: 0.0
  epochs: 10
  batch_size: 48
  amp: true
  num_workers: 8

few_shot:
  shots: [1, 2, 4]
  seeds: [0, 1, 2]

fusion:
  alpha: 0.5
  beta: 0.75

loss:
  lambda_image: 1.0
  lambda_pixel: 1.0
  lambda_oasl: 1.0
